[colors]
background = #222D32
background-alt = #283738
foreground = #e3fff9
primary = #c7ffa8
secondary = #9fcfb2
alert = #a56642
disabled = #70807f

[bar/example]
width = 100%
height = 24pt
radius = 12

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 3pt
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 1

separator = /
separator-foreground = ${colors.disabled}

font-0 = "CommitMono:size=12;2"
font-1 = "CommitMono:size=10;3"

modules-left = xworkspaces xwindow player playertime
modules-right = xkeyboard pulseaudio memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
        
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/player]
type = custom/script
exec = playerctl metadata --format "{{ artist }} - {{ title }}"
interval = 2
label = %output:0:40:...%
label-foreground = ${colors.primary}

[module/playertime]
type = custom/script
exec = playerctl position --format "{{ duration(position) }}"
interval = 1
label = %output%

[module/xworkspaces]
type = internal/xworkspaces

label-active = %{F#c7ffa8}%index%%{F-} %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %index%
label-occupied-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %index%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:20:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "vol "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = 

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.primary}
label-indicator-on-capslock = %{T2}%{B#c7ffa8}%{F#222D32} ABC %{B-}%{F-}%{T-}
label-indicator-off-capslock = %{T2}%{B#222D32}%{F#70807f} abc %{B-}%{F-}%{T-}

label-indicator-on-numlock = %{T2}%{B#c7ffa8}%{F#222D32} 123 %{B-}%{F-}%{T-}
label-indicator-off-numlock = %{T2}%{B#222D32}%{F#70807f} 123 %{B-}%{F-}%{T-}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#707880}%ifname%%{F-} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#707880}%ifname%%{F-} %signal%% connected

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
